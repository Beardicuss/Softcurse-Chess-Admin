name: Automated Credential Hunter

on:
  schedule:
    # Run every 12 hours automatically
    - cron: '0 */12 * * *'
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Execute Search Algorithm
        run: pnpm run hunt

      - name: Sync Discovered Keys to PlanetScale
        run: pnpm run hunt:sync
        env:
          # This must be configured in your GitHub Repository Settings > Secrets and variables > Actions
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
